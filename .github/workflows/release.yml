name: Release

# Triggered by pushing a SemVer tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Builds the universal CLI binaries + the unsigned app, signs the app archive for Sparkle, regenerates
# the appcast, and publishes a GitHub Release with everything attached. Nothing here needs a paid Apple
# cert: the app ships UNSIGNED (Gatekeeper right-click-Open), and the only secret is the Sparkle EdDSA
# private key (SPARKLE_ED_PRIVATE_KEY) used to sign update archives — it never lands in the repo.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write          # create the GitHub Release

env:
  SPARKLE_TOOLS_VERSION: "2.6.4"   # which Sparkle release to pull `sign_update` from (pin for reproducibility)

jobs:
  release:
    # macos-26 ships Xcode 26 / the macOS 26 SDK, which the app needs to COMPILE its Liquid Glass
    # path (`glassEffect`). The app still RUNS on macOS 14+ (the call is guarded by `if #available`).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # need full history for a monotonic build number

      - name: Resolve version + build number
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD="$(git rev-list --count HEAD)"   # monotonic — Sparkle compares CFBundleVersion
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          echo "Building Engram $VERSION (build $BUILD) from $GITHUB_REF_NAME"
          swift --version
          xcodebuild -version || true

      # ---------- universal CLI binaries (engram-mcp + engram-capture) ----------
      - name: Build CLI (universal arm64 + x86_64)
        run: |
          set -euo pipefail
          # Build each product in its OWN invocation: a single `swift build` with multiple --product
          # AND multiple --arch only lipo-merges one product's universal binary (the other is left
          # absent). Separate builds reliably produce a universal binary for each.
          swift build -c release --arch arm64 --arch x86_64 --product engram-mcp
          swift build -c release --arch arm64 --arch x86_64 --product engram-capture
          BIN="$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)"
          mkdir -p dist
          for b in engram-mcp engram-capture; do
            test -f "$BIN/$b" || { echo "::error::$b missing from $BIN after build"; exit 1; }
            cp "$BIN/$b" dist/
          done
          lipo -info dist/engram-mcp dist/engram-capture   # both must be fat (x86_64 + arm64)

      - name: Package CLI tarball + checksum
        run: |
          set -euo pipefail
          cd dist
          # COPYFILE_DISABLE: no AppleDouble (._*) files or stray xattrs in the archive — a clean tarball.
          COPYFILE_DISABLE=1 tar -czf engram-cli-macos-universal.tar.gz engram-mcp engram-capture
          shasum -a 256 engram-cli-macos-universal.tar.gz | tee engram-cli-macos-universal.tar.gz.sha256

      # ---------- the GUI app (unsigned, universal) ----------
      - name: Build Engram.app (universal, unsigned)
        env:
          SWIFT_BUILD_FLAGS: "--arch arm64 --arch x86_64"
          OUT_DIR: "dist"
          APP_VERSION: ${{ steps.meta.outputs.version }}
          APP_BUILD: ${{ steps.meta.outputs.build }}
        run: bash packaging/make-app.sh

      - name: Zip Engram.app + checksum
        run: |
          set -euo pipefail
          ZIP="dist/Engram-${{ steps.meta.outputs.version }}.zip"
          ditto -c -k --keepParent "dist/Engram.app" "$ZIP"
          shasum -a 256 "$ZIP" | tee "$ZIP.sha256"

      # ---------- Sparkle: sign the app archive + (re)build the appcast ----------
      - name: Fetch Sparkle sign_update
        run: |
          set -euo pipefail
          URL="https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TOOLS_VERSION}/Sparkle-${SPARKLE_TOOLS_VERSION}.tar.xz"
          curl -fsSL "$URL" -o sparkle.tar.xz
          mkdir -p sparkle && tar -xJf sparkle.tar.xz -C sparkle
          echo "SIGN_UPDATE=$(find "$PWD/sparkle" -name sign_update -type f | head -n1)" >> "$GITHUB_ENV"

      - name: Build signed appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          BUILD="${{ steps.meta.outputs.build }}"
          TAG="${{ steps.meta.outputs.tag }}"
          ZIP="dist/Engram-${VERSION}.zip"
          ENCLOSURE_URL="https://github.com/albertofettucini/Engram/releases/download/${TAG}/Engram-${VERSION}.zip"

          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]; then
            echo "::warning::SPARKLE_ED_PRIVATE_KEY is not set — skipping appcast (the .app still ships, but in-app updates won't be fed). Set the secret before a real release."
            exit 0
          fi

          # Sign the archive. Key from CI secret via a temp file (chmod 600, removed after).
          KEYFILE="$RUNNER_TEMP/sparkle_ed_priv"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEYFILE"
          chmod 600 "$KEYFILE"
          # Accept either the long or short key-file flag, depending on the Sparkle tools version.
          if "$SIGN_UPDATE" --help 2>&1 | grep -q -- '--ed-key-file'; then
            SIGN_OUT="$("$SIGN_UPDATE" --ed-key-file "$KEYFILE" "$ZIP")"
          else
            SIGN_OUT="$("$SIGN_UPDATE" -f "$KEYFILE" "$ZIP")"
          fi
          rm -f "$KEYFILE"
          echo "sign_update: $SIGN_OUT"
          SIG="$(printf '%s' "$SIGN_OUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')"
          LEN="$(printf '%s' "$SIGN_OUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')"
          if [ -z "$SIG" ] || [ -z "$LEN" ]; then
            echo "::error::could not parse sign_update output"; exit 1
          fi

          # Carry history forward: pull the previous feed (404 on the first release → start fresh).
          curl -fsSL "https://github.com/albertofettucini/Engram/releases/latest/download/appcast.xml" \
            -o prev-appcast.xml || echo "no previous appcast (first release)"

          PREV_ARG=""
          if [ -s prev-appcast.xml ]; then PREV_ARG="--prev prev-appcast.xml"; fi   # -s: exists AND non-empty
          python3 packaging/make-appcast.py \
            --version "$VERSION" --build "$BUILD" --min-os "14.0" \
            --url "$ENCLOSURE_URL" --signature "$SIG" --length "$LEN" \
            $PREV_ARG \
            --out dist/appcast.xml
          echo "----- appcast.xml -----"; cat dist/appcast.xml

      # ---------- publish ----------
      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          ASSETS=(
            "dist/Engram-${VERSION}.zip"
            "dist/Engram-${VERSION}.zip.sha256"
            "dist/engram-cli-macos-universal.tar.gz"
            "dist/engram-cli-macos-universal.tar.gz.sha256"
          )
          [ -f dist/appcast.xml ] && ASSETS+=("dist/appcast.xml")

          NOTES="$(cat <<EOF
          Engram ${VERSION} — one shared, local memory for your AIs.

          **Install**
          - Homebrew (CLI + MCP server): \`brew install albertofettucini/engram/engram\`
          - Or download \`Engram-${VERSION}.zip\` below, unzip, drag to Applications, then right-click → Open (unsigned app).

          The \`.app\` is unsigned (no paid Apple cert); the CLI binaries are universal (Apple Silicon + Intel).
          See the README for connecting the memory to Claude via \`engram-mcp --connect\`.
          EOF
          )"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" --title "Engram ${VERSION}" --notes "$NOTES"
          fi
